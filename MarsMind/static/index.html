<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astronaut Manual Copilot</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #faf9f6;
    color: #2d2b26;
    margin: 0;
    height: 100vh;
    display: flex;
  }

  /* ---------- sidebar ---------- */
  #sidebar {
    width: 240px;
    background: #f0eee7;
    border-right: 1px solid #e0dcd2;
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    flex-shrink: 0;
  }
  #new-chat-btn {
    background: #2d2b26;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 16px;
    text-align: left;
  }
  #new-chat-btn:hover { background: #423f38; }
  #history-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #a8a290;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  #history-list {
    overflow-y: auto;
    flex: 1;
  }
  .history-item {
    padding: 9px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: #55524a;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .history-item:hover { background: #e6e2d8; }
  .history-item.active { background: #e0dcd0; color: #2d2b26; font-weight: 500; }

  /* ---------- main column ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e8e5df;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  header h1 { font-size: 18px; font-weight: 600; margin: 0 0 2px; }
  header p { font-size: 13px; color: #8a8578; margin: 0; }
  .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #4a9b6e; margin-right: 6px;
  }

  /* ---------- profile menu ---------- */
  #profile-wrap { position: relative; flex-shrink: 0; }
  #profile-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: #d97757; color: white; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #profile-menu {
    position: absolute;
    top: 44px;
    right: 0;
    background: white;
    border: 1px solid #e8e5df;
    border-radius: 10px;
    width: 210px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    display: none;
    z-index: 10;
    overflow: hidden;
  }
  #profile-menu.show { display: block; }
  .menu-section { padding: 10px 14px; border-bottom: 1px solid #f0eee7; }
  .menu-section:last-child { border-bottom: none; }
  .menu-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #b0aa9a; margin-bottom: 6px; }
  .menu-row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; padding: 6px 0; }
  .menu-item { font-size: 13.5px; padding: 8px 0; cursor: pointer; color: #2d2b26; }
  .menu-item:hover { color: #d97757; }
  select.lang-select {
    border: 1px solid #e0dcd2; border-radius: 6px; font-size: 13px;
    padding: 3px 6px; background: white; color: #2d2b26;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .empty-state { text-align: center; color: #b0aa9a; margin-top: 80px; font-size: 14px; }

  .message { margin-bottom: 20px; display: flex; }
  .message.user { justify-content: flex-end; }
  .message.assistant { justify-content: flex-start; }

  .bubble { max-width: 78%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.6; }
  .message.user .bubble { background: #d97757; color: white; border-bottom-right-radius: 4px; }
  .message.assistant .bubble {
    background: white; border: 1px solid #e8e5df; border-bottom-left-radius: 4px;
    white-space: pre-wrap;
  }

  .status-banner {
    max-width: 720px; margin: 0 auto 16px; padding: 10px 16px;
    border-radius: 10px; font-size: 13px; display: none;
  }
  .status-banner.show { display: block; }
  .status-banner.info { background: #eef2ff; color: #4a5da0; }
  .status-banner.warn { background: #fdf3e0; color: #a5720f; }
  .status-banner.error { background: #fde8e8; color: #b3413d; }

  footer { border-top: 1px solid #e8e5df; padding: 16px 24px 20px; }
  .input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
  input[type=text] {
    flex: 1; border: 1px solid #e0dcd2; background: white; padding: 12px 16px;
    border-radius: 24px; font-size: 15px; outline: none;
  }
  input[type=text]:focus { border-color: #d97757; }

  button { border: none; cursor: pointer; border-radius: 24px; font-size: 14px; font-weight: 500; }
  #mic-btn {
    background: #2d2b26; color: white; width: 44px; height: 44px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  #mic-btn:disabled { background: #c7c2b6; cursor: not-allowed; }
  #send-btn { background: #d97757; color: white; padding: 12px 20px; flex-shrink: 0; }
  #send-btn:hover { background: #c96a4c; }
</style>
</head>
<body>

<div id="sidebar">
  <button id="new-chat-btn" onclick="startNewChat()">+ New chat</button>
  <div id="history-label">History</div>
  <div id="history-list"></div>
</div>

<div id="main">
  <header>
    <div>
      <h1><span class="status-dot"></span>Astronaut manual copilot</h1>
      <p>Offline diagnostic assistant running on-device with Gemma. No internet connection required.</p>
    </div>
    <div id="profile-wrap">
      <button id="profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">A</button>
      <div id="profile-menu">
        <div class="menu-section">
          <div class="menu-label">Signed in as</div>
          <div style="font-size: 13.5px;">Astronaut</div>
        </div>
        <div class="menu-section">
          <div class="menu-row">
            <span>Language</span>
            <select class="lang-select">
              <option>English</option>
            </select>
          </div>
        </div>
        <div class="menu-section">
          <div class="menu-item">Settings</div>
          <div class="menu-item">Log out</div>
        </div>
      </div>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">Speak or type a problem to get started.</div>
  </div>

  <div class="status-banner" id="status-banner"></div>

  <footer>
    <div class="input-row">
      <button id="mic-btn" onclick="startRecording()" aria-label="Speak">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v4"/>
        </svg>
      </button>
      <input type="text" id="text-input" placeholder="Describe the issue, or use the mic"
             onkeydown="if(event.key==='Enter') submitText()">
      <button id="send-btn" onclick="submitText()">Send</button>
    </div>
  </footer>
</div>

<script>
const chat = document.getElementById('chat');
const emptyState = document.getElementById('empty-state');
const statusBanner = document.getElementById('status-banner');
const micBtn = document.getElementById('mic-btn');
const historyList = document.getElementById('history-list');

let currentConversationId = null;

function showStatus(text, type) {
  statusBanner.textContent = text;
  statusBanner.className = 'status-banner show ' + type;
}
function hideStatus() {
  statusBanner.className = 'status-banner';
}

function addMessage(role, text) {
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'message ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function clearChat() {
  chat.innerHTML = '';
  chat.appendChild(emptyState);
  emptyState.style.display = 'block';
}

function startNewChat() {
  currentConversationId = null;
  clearChat();
  hideStatus();
  refreshHistoryHighlight();
}

async function loadHistoryList() {
  try {
    const res = await fetch('/conversations');
    const items = await res.json();
    historyList.innerHTML = '';
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'history-item' + (item.id === currentConversationId ? ' active' : '');
      el.textContent = item.title || 'Untitled';
      el.onclick = () => loadConversation(item.id);
      historyList.appendChild(el);
    });
  } catch (err) {
    console.error('Could not load history', err);
  }
}

function refreshHistoryHighlight() {
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
}

async function loadConversation(id) {
  currentConversationId = id;
  const res = await fetch('/conversations/' + id);
  const data = await res.json();
  clearChat();
  data.messages.forEach(m => addMessage(m.role, m.text));
  loadHistoryList();
}

async function startRecording() {
  micBtn.disabled = true;
  for (const n of [3, 2, 1]) {
    showStatus('Get ready... ' + n, 'info');
    await new Promise(r => setTimeout(r, 1000));
  }
  showStatus('Recording, speak your problem now...', 'warn');

  try {
    const url = '/record-and-respond' + (currentConversationId ? '?conversation_id=' + currentConversationId : '');
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json();
    hideStatus();

    if (data.error) {
      showStatus(data.error, 'error');
      micBtn.disabled = false;
      return;
    }
    currentConversationId = data.conversation_id;
    addMessage('user', data.query);
    addMessage('assistant', data.answer);
    loadHistoryList();
  } catch (err) {
    showStatus('Error connecting to server: ' + err, 'error');
  }
  micBtn.disabled = false;
}

async function submitText() {
  const input = document.getElementById('text-input');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  addMessage('user', query);
  const bubble = addMessage('assistant', 'Thinking...');
  showStatus('Gemma is reasoning through the manuals...', 'info');

  try {
    const res = await fetch('/ask-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, conversation_id: currentConversationId })
    });
    const data = await res.json();
    hideStatus();

    if (data.error) {
      bubble.textContent = data.error;
      return;
    }
    currentConversationId = data.conversation_id;
    bubble.textContent = data.answer;
    loadHistoryList();
  } catch (err) {
    bubble.textContent = 'Error connecting to server: ' + err;
  }
}

function toggleProfileMenu() {
  document.getElementById('profile-menu').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('profile-wrap');
  if (!wrap.contains(e.target)) {
    document.getElementById('profile-menu').classList.remove('show');
  }
});

loadHistoryList();
</script>

</body>
</html>
