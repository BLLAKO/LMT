<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astronaut Manual Copilot</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #faf9f6;
    color: #2d2b26;
    margin: 0;
    height: 100vh;
    display: flex;
  }

  /* ---------- sidebar ---------- */
  #sidebar {
    width: 240px;
    background: #f0eee7;
    border-right: 1px solid #e0dcd2;
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    flex-shrink: 0;
  }
  #new-chat-btn {
    background: #2d2b26;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 16px;
    text-align: left;
  }
  #new-chat-btn:hover { background: #423f38; }
  #history-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #a8a290;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  #history-list {
    overflow-y: auto;
    flex: 1;
  }
  .history-item {
    padding: 9px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: #55524a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 2px;
  }
  .history-item-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item:hover { background: #e6e2d8; }
  .history-item.active { background: #e0dcd0; color: #2d2b26; font-weight: 500; }
  .history-delete-btn {
    background: none;
    border: none;
    color: #a8a290;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
    display: none;
  }
  .history-item:hover .history-delete-btn { display: block; }
  .history-delete-btn:hover { color: #b3413d; background: #f3d9d8; }

  .thinking-dots { display: inline-flex; gap: 3px; padding: 2px 0; }
  .thinking-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: #b0aa9a;
    animation: thinking-bounce 1.2s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes thinking-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  #stop-btn {
    background: #2d2b26; color: white; padding: 12px 20px; flex-shrink: 0; display: none;
  }
  #stop-btn:hover { background: #423f38; }

  /* ---------- main column ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e8e5df;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  header h1 { font-size: 18px; font-weight: 600; margin: 0 0 2px; }
  header p { font-size: 13px; color: #8a8578; margin: 0; }
  .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #4a9b6e; margin-right: 6px;
  }

  /* ---------- profile menu ---------- */
  #profile-wrap { position: relative; flex-shrink: 0; }
  #profile-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: #d97757; color: white; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #profile-menu {
    position: absolute;
    top: 44px;
    right: 0;
    background: white;
    border: 1px solid #e8e5df;
    border-radius: 10px;
    width: 210px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    display: none;
    z-index: 10;
    overflow: hidden;
  }
  #profile-menu.show { display: block; }
  .menu-section { padding: 6px; border-bottom: 1px solid #f0eee7; }
  .menu-section:last-child { border-bottom: none; }
  .menu-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #b0aa9a; margin: 6px 10px 4px; }
  .menu-user-name { font-size: 13.5px; padding: 2px 10px 8px; }

  .menu-item {
    font-size: 13.5px; padding: 8px 10px; cursor: pointer; color: #2d2b26;
    display: flex; align-items: center; gap: 10px; border-radius: 6px;
  }
  .menu-item:hover { background: #f3f1ec; }
  .menu-item svg { flex-shrink: 0; opacity: 0.7; }

  .lang-dropdown { position: relative; }
  .lang-trigger {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    font-size: 13.5px; padding: 8px 10px; cursor: pointer; border-radius: 6px; color: #2d2b26;
  }
  .lang-trigger:hover { background: #f3f1ec; }
  .lang-trigger-right { display: flex; align-items: center; gap: 4px; color: #8a8578; }
  .lang-options {
    display: none;
    padding: 4px 6px 6px;
  }
  .lang-options.show { display: block; }
  .lang-option {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13.5px; padding: 7px 10px; border-radius: 6px; cursor: pointer; color: #2d2b26;
  }
  .lang-option:hover { background: #f3f1ec; }
  .lang-option svg { opacity: 0; }
  .lang-option.selected svg { opacity: 1; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .empty-state { text-align: center; color: #b0aa9a; margin-top: 80px; font-size: 14px; }

  .message { margin-bottom: 20px; display: flex; }
  .message.user { justify-content: flex-end; }
  .message.assistant { justify-content: flex-start; }

  .bubble { max-width: 78%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.6; }
  .message.user .bubble { background: #d97757; color: white; border-bottom-right-radius: 4px; }
  .message.assistant .bubble {
    background: white; border: 1px solid #e8e5df; border-bottom-left-radius: 4px;
    white-space: pre-wrap;
  }

  .status-banner {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    width: max-content;
    max-width: 480px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    z-index: 20;
  }
  .status-banner.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .status-banner.info { background: #eef2ff; color: #4a5da0; }
  .status-banner.warn { background: #fdf3e0; color: #a5720f; }
  .status-banner.error { background: #fde8e8; color: #b3413d; }

  footer { border-top: 1px solid #e8e5df; padding: 16px 24px 20px; }

  .voice-preview {
    max-width: 720px;
    margin: 0 auto 12px;
    background: white;
    border: 1px solid #e8e5df;
    border-radius: 14px;
    padding: 16px 18px 12px;
    display: none;
  }
  .voice-preview.show { display: block; }
  .voice-preview-text {
    font-size: 15px;
    color: #2d2b26;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .voice-preview-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    border-top: 1px dashed #e8e5df;
    padding-top: 10px;
  }
  .voice-preview-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer;
  }
  .voice-discard-btn { background: #f3f1ec; color: #55524a; }
  .voice-discard-btn:hover { background: #e6e2d8; }
  .voice-confirm-btn { background: #d97757; color: white; }
  .voice-confirm-btn:hover { background: #c96a4c; }
  .input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
  input[type=text] {
    flex: 1; border: 1px solid #e0dcd2; background: white; padding: 12px 16px;
    border-radius: 24px; font-size: 15px; outline: none;
  }
  input[type=text]:focus { border-color: #d97757; }

  button { border: none; cursor: pointer; border-radius: 24px; font-size: 14px; font-weight: 500; }
  #mic-btn {
    background: #2d2b26; color: white; width: 44px; height: 44px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    position: relative; transition: background 0.2s;
  }
  #mic-btn:disabled { background: #c7c2b6; cursor: not-allowed; }
  #mic-btn.listening { background: #d97757; }
  .mic-bars {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 2px;
    position: absolute;
    inset: 0;
  }
  #mic-btn.listening .mic-icon { display: none; }
  #mic-btn.listening .mic-bars { display: flex; }
  .mic-bars span {
    width: 3px;
    background: white;
    border-radius: 2px;
    animation: mic-bar 0.9s ease-in-out infinite;
  }
  .mic-bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .mic-bars span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .mic-bars span:nth-child(3) { height: 18px; animation-delay: 0.3s; }
  .mic-bars span:nth-child(4) { height: 12px; animation-delay: 0.45s; }
  .mic-bars span:nth-child(5) { height: 8px; animation-delay: 0.6s; }
  @keyframes mic-bar {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  #send-btn { background: #d97757; color: white; padding: 12px 20px; flex-shrink: 0; }
  #send-btn:hover { background: #c96a4c; }
  #cancel-mic-btn {
    background: #f3f1ec; color: #8a8578; width: 44px; height: 44px; border-radius: 50%;
    flex-shrink: 0; display: none; align-items: center; justify-content: center;
  }
  #cancel-mic-btn:hover { background: #e6e2d8; color: #b3413d; }
  #cancel-mic-btn.show { display: flex; }
  #confirm-mic-btn {
    background: #d97757; color: white; width: 44px; height: 44px; border-radius: 50%;
    flex-shrink: 0; display: none; align-items: center; justify-content: center;
  }
  #confirm-mic-btn:hover { background: #c96a4c; }
  #confirm-mic-btn.show { display: flex; }
</style>
</head>
<body>

<div id="sidebar">
  <button id="new-chat-btn" onclick="startNewChat()">+ New chat</button>
  <div id="history-label">History</div>
  <div id="history-list"></div>
</div>

<div id="main">
  <header>
    <div>
      <h1><span class="status-dot"></span>Astronaut manual copilot</h1>
      <p>Offline diagnostic assistant running on-device with Gemma. No internet connection required.</p>
    </div>
    <div id="profile-wrap">
      <button id="profile-btn" onclick="toggleProfileMenu()" aria-label="Profile">A</button>
      <div id="profile-menu">
        <div class="menu-section">
          <div class="menu-label">Signed in as</div>
          <div class="menu-user-name">Astronaut</div>
        </div>
        <div class="menu-section">
          <div class="lang-dropdown">
            <div class="lang-trigger" onclick="toggleLangOptions(event)">
              <span>Language</span>
              <span class="lang-trigger-right">
                <span id="lang-current">English</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
              </span>
            </div>
            <div class="lang-options" id="lang-options">
              <div class="lang-option selected" onclick="selectLanguage('English', event)">
                <span>English</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d97757" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
              </div>
            </div>
          </div>
        </div>
        <div class="menu-section">
          <div class="menu-item">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span>Settings</span>
          </div>
          <div class="menu-item">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
            <span>Log out</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">Speak or type a problem to get started.</div>
  </div>

  <div class="status-banner" id="status-banner"></div>

  <footer>
    <div class="input-row">
      <button id="mic-btn" onclick="startRecording()" aria-label="Speak">
        <svg class="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18v4"/>
        </svg>
        <div class="mic-bars"><span></span><span></span><span></span><span></span><span></span></div>
      </button>
      <input type="text" id="text-input" placeholder="Describe the issue, or use the mic"
             onkeydown="if(event.key==='Enter') submitText()">
      <button id="cancel-mic-btn" onclick="cancelRecording()" aria-label="Cancel recording">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <button id="confirm-mic-btn" onclick="stopAndSend()" aria-label="Stop and send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </button>
      <button id="send-btn" onclick="submitText()">Send</button>
      <button id="stop-btn" onclick="stopStreaming()">Stop</button>
    </div>
  </footer>
</div>

<script>
const chat = document.getElementById('chat');
const emptyState = document.getElementById('empty-state');
const statusBanner = document.getElementById('status-banner');
const micBtn = document.getElementById('mic-btn');
const historyList = document.getElementById('history-list');

let currentConversationId = null;

function showStatus(text, type) {
  statusBanner.textContent = text;
  statusBanner.className = 'status-banner show ' + type;
}
function hideStatus() {
  statusBanner.className = 'status-banner';
}

function addMessage(role, text) {
  emptyState.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'message ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function clearChat() {
  chat.innerHTML = '';
  chat.appendChild(emptyState);
  emptyState.style.display = 'block';
}

function startNewChat() {
  currentConversationId = null;
  clearChat();
  hideStatus();
  refreshHistoryHighlight();
}

async function loadHistoryList() {
  try {
    const res = await fetch('/conversations');
    const items = await res.json();
    historyList.innerHTML = '';
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'history-item' + (item.id === currentConversationId ? ' active' : '');
      el.onclick = () => loadConversation(item.id);

      const titleSpan = document.createElement('span');
      titleSpan.className = 'history-item-title';
      titleSpan.textContent = item.title || 'Untitled';

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'history-delete-btn';
      deleteBtn.textContent = '✕';
      deleteBtn.setAttribute('aria-label', 'Delete conversation');
      deleteBtn.onclick = (e) => {
        e.stopPropagation();
        deleteConversation(item.id);
      };

      el.appendChild(titleSpan);
      el.appendChild(deleteBtn);
      historyList.appendChild(el);
    });
  } catch (err) {
    console.error('Could not load history', err);
  }
}

async function deleteConversation(id) {
  if (!confirm('Delete this conversation?')) return;
  await fetch('/conversations/' + id, { method: 'DELETE' });
  if (id === currentConversationId) {
    startNewChat();
  }
  loadHistoryList();
}

function refreshHistoryHighlight() {
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
}

async function loadConversation(id) {
  currentConversationId = id;
  const res = await fetch('/conversations/' + id);
  const data = await res.json();
  clearChat();
  data.messages.forEach(m => addMessage(m.role, m.text));
  loadHistoryList();
}

let activeAbortController = null;

function showThinkingDots(bubble) {
  bubble.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';
}

function toggleSendStop(isStreaming) {
  document.getElementById('send-btn').style.display = isStreaming ? 'none' : 'block';
  document.getElementById('stop-btn').style.display = isStreaming ? 'block' : 'none';
}

function stopStreaming() {
  if (activeAbortController) {
    activeAbortController.abort();
  }
}

async function streamAnswer(bubble) {
  const url = '/ask-stream';
  activeAbortController = new AbortController();
  toggleSendStop(true);
  showThinkingDots(bubble);

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: bubble.dataset.query, conversation_id: currentConversationId }),
      signal: activeAbortController.signal
    });

    const returnedId = res.headers.get('X-Conversation-Id');
    if (returnedId) currentConversationId = returnedId;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let firstChunk = true;
    let done = false;
    while (!done) {
      const { value, done: streamDone } = await reader.read();
      done = streamDone;
      if (value) {
        if (firstChunk) {
          bubble.textContent = '';
          firstChunk = false;
        }
        bubble.textContent += decoder.decode(value, { stream: true });
        chat.scrollTop = chat.scrollHeight;
      }
    }
    loadHistoryList();
  } catch (err) {
    if (err.name === 'AbortError') {
      bubble.textContent += '\n\n[stopped]';
    } else {
      bubble.textContent = 'Error connecting to server: ' + err;
    }
  } finally {
    toggleSendStop(false);
    activeAbortController = null;
  }
}

let recordingAbortController = null;
let isListening = false;

function showListeningStatus(text) {
  statusBanner.innerHTML = text + ' <span class="thinking-dots"><span></span><span></span><span></span></span>';
  statusBanner.className = 'status-banner show warn';
}

function setListeningButtons(show) {
  document.getElementById('cancel-mic-btn').classList.toggle('show', show);
  document.getElementById('confirm-mic-btn').classList.toggle('show', show);
  document.getElementById('send-btn').style.display = show ? 'none' : 'block';
}

async function startRecording() {
  if (isListening) return;

  isListening = true;
  micBtn.classList.add('listening');
  setListeningButtons(true);
  showListeningStatus('Listening');

  try {
    await fetch('/start-recording', { method: 'POST' });
  } catch (err) {
    hideStatus();
    showStatus('Error starting microphone: ' + err, 'error');
    isListening = false;
    micBtn.classList.remove('listening');
    setListeningButtons(false);
  }
}

async function stopAndSend() {
  isListening = false;
  micBtn.classList.remove('listening');
  setListeningButtons(false);
  micBtn.disabled = true;
  showStatus('Transcribing...', 'info');

  try {
    const url = '/stop-recording' + (currentConversationId ? '?conversation_id=' + currentConversationId : '');
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json();
    hideStatus();

    if (data.error) {
      showStatus(data.error, 'error');
    } else {
      currentConversationId = data.conversation_id;
      addMessage('user', data.query);
      showStatus('Gemma is reasoning through the manuals...', 'info');
      const bubble = addMessage('assistant', '');
      bubble.dataset.query = data.query;
      await streamAnswer(bubble);
      hideStatus();
    }
  } catch (err) {
    hideStatus();
    showStatus('Error connecting to server: ' + err, 'error');
  }
  micBtn.disabled = false;
}

async function cancelRecording() {
  isListening = false;
  micBtn.classList.remove('listening');
  setListeningButtons(false);
  hideStatus();
  try {
    await fetch('/cancel-recording', { method: 'POST' });
  } catch (err) {
    console.error('Cancel failed', err);
  }
}

async function submitText() {
  const input = document.getElementById('text-input');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  addMessage('user', query);
  showStatus('Gemma is reasoning through the manuals...', 'info');

  const bubble = addMessage('assistant', '');
  bubble.dataset.query = query;
  await streamAnswer(bubble);
  hideStatus();
}

function toggleProfileMenu() {
  document.getElementById('profile-menu').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('profile-wrap');
  if (!wrap.contains(e.target)) {
    document.getElementById('profile-menu').classList.remove('show');
    document.getElementById('lang-options').classList.remove('show');
  }
});

function toggleLangOptions(e) {
  e.stopPropagation();
  document.getElementById('lang-options').classList.toggle('show');
}

function selectLanguage(name, e) {
  e.stopPropagation();
  document.getElementById('lang-current').textContent = name;
  document.querySelectorAll('.lang-option').forEach(el => el.classList.remove('selected'));
  e.currentTarget.classList.add('selected');
  document.getElementById('lang-options').classList.remove('show');
}

loadHistoryList();
</script>
